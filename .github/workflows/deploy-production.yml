name: Deploy production

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  APP_VERSION: "0.2.0"
  NODE_VERSION: "22"
  RELEASE_ARCHIVE: production-release.tgz

jobs:
  deploy:
    name: Build and deploy production
    runs-on: ubuntu-latest
    if: github.repository == 'ttmanthatman/virtual-human-flow'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app version
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("node:fs");
          const expected = process.env.APP_VERSION;
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf-8"));
          const lock = JSON.parse(fs.readFileSync("package-lock.json", "utf-8"));
          if (pkg.version !== expected || lock.version !== expected || lock.packages[""].version !== expected) {
            throw new Error(`Version mismatch: expected ${expected}, package=${pkg.version}, lock=${lock.version}, root=${lock.packages[""].version}`);
          }
          console.log(`Deploying virtual-human-flow ${expected}`);
          NODE

      - name: Build production bundle
        run: npm run build

      - name: Package release
        run: |
          set -euo pipefail
          tar --create --gzip --file "$RELEASE_ARCHIVE" dist server.mjs serverSupport.mjs builtinPersonaDossiers.mjs package.json package-lock.json
          tar --list --gzip --file "$RELEASE_ARCHIVE" | grep -Fx serverSupport.mjs
          tar --list --gzip --file "$RELEASE_ARCHIVE" | grep -Fx builtinPersonaDossiers.mjs

      - name: Validate deployment secrets
        env:
          PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          PRODUCTION_SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          PRODUCTION_SSH_KEY_B64: ${{ secrets.PRODUCTION_SSH_KEY_B64 }}
          PRODUCTION_APP_DIR: ${{ secrets.PRODUCTION_APP_DIR }}
          PRODUCTION_BACKUP_DIR: ${{ secrets.PRODUCTION_BACKUP_DIR }}
          PRODUCTION_PM2_NAME: ${{ secrets.PRODUCTION_PM2_NAME }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT }}
          LIAO_CHATROOM_ORIGIN: ${{ secrets.LIAO_CHATROOM_ORIGIN }}
        run: |
          set -euo pipefail
          test -n "$PRODUCTION_SSH_HOST"
          test -n "$PRODUCTION_SSH_USER"
          test -n "$PRODUCTION_SSH_KEY_B64"
          test -n "$PRODUCTION_APP_DIR"
          test -n "$PRODUCTION_BACKUP_DIR"
          test -n "$PRODUCTION_PM2_NAME"
          test -n "$PRODUCTION_PORT"
          test -n "$LIAO_CHATROOM_ORIGIN"

      - name: Prepare SSH
        env:
          PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          PRODUCTION_SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT }}
          PRODUCTION_SSH_KEY_B64: ${{ secrets.PRODUCTION_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          ssh_port="${PRODUCTION_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s' "$PRODUCTION_SSH_KEY_B64" | base64 --decode > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key
          ssh-keyscan -p "$ssh_port" -H "$PRODUCTION_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          PRODUCTION_SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          PRODUCTION_SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT }}
        run: |
          set -euo pipefail
          ssh_port="${PRODUCTION_SSH_PORT:-22}"
          scp -P "$ssh_port" -i ~/.ssh/production_key "$RELEASE_ARCHIVE" \
            "$PRODUCTION_SSH_USER@$PRODUCTION_SSH_HOST:/tmp/$RELEASE_ARCHIVE"

      - name: Activate release
        env:
          PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          PRODUCTION_SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          PRODUCTION_SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT }}
          PRODUCTION_APP_DIR: ${{ secrets.PRODUCTION_APP_DIR }}
          PRODUCTION_BACKUP_DIR: ${{ secrets.PRODUCTION_BACKUP_DIR }}
          PRODUCTION_PM2_NAME: ${{ secrets.PRODUCTION_PM2_NAME }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT }}
          LIAO_CHATROOM_ORIGIN: ${{ secrets.LIAO_CHATROOM_ORIGIN }}
        run: |
          set -euo pipefail
          ssh_port="${PRODUCTION_SSH_PORT:-22}"
          ssh -p "$ssh_port" -i ~/.ssh/production_key "$PRODUCTION_SSH_USER@$PRODUCTION_SSH_HOST" \
            "APP_DIR='$PRODUCTION_APP_DIR' BACKUP_DIR='$PRODUCTION_BACKUP_DIR' PM2_NAME='$PRODUCTION_PM2_NAME' PORT='$PRODUCTION_PORT' LIAO_CHATROOM_ORIGIN='$LIAO_CHATROOM_ORIGIN' RELEASE_ARCHIVE='/tmp/$RELEASE_ARCHIVE' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          case "$APP_DIR" in
            /*) ;;
            *) echo "Configured app directory must be absolute" >&2; exit 1 ;;
          esac
          case "$BACKUP_DIR" in
            /*) ;;
            *) echo "Configured backup directory must be absolute" >&2; exit 1 ;;
          esac
          if [ "$APP_DIR" = "/" ] || [ "$BACKUP_DIR" = "/" ] || [ -z "$PM2_NAME" ] || [ -z "$PORT" ] || [ -z "$LIAO_CHATROOM_ORIGIN" ]; then
            echo "Refusing unsafe production deployment settings" >&2
            exit 1
          fi

          timestamp="$(date +%Y%m%d%H%M%S)"
          mkdir -p "$APP_DIR" "$BACKUP_DIR"

          if [ -d "$APP_DIR" ] && [ "$(find "$APP_DIR" -mindepth 1 -maxdepth 1 | head -n 1)" ]; then
            tar --create --gzip --file "$BACKUP_DIR/$timestamp.tgz" --directory "$APP_DIR" .
            echo "Backed up current app to $BACKUP_DIR/$timestamp.tgz"
          fi

          tar --extract --gzip --file "$RELEASE_ARCHIVE" --directory "$APP_DIR"
          cd "$APP_DIR"
          npm ci --omit=dev

          if pm2 describe "$PM2_NAME" >/dev/null 2>&1; then
            PORT="$PORT" LIAO_CHATROOM_ORIGIN="$LIAO_CHATROOM_ORIGIN" pm2 restart "$PM2_NAME" --update-env
          else
            PORT="$PORT" LIAO_CHATROOM_ORIGIN="$LIAO_CHATROOM_ORIGIN" pm2 start server.mjs --name "$PM2_NAME" --update-env
          fi

          pm2 save
          curl --fail --silent --show-error "http://127.0.0.1:$PORT/health"
          rm -f "$RELEASE_ARCHIVE"
          REMOTE_SCRIPT
